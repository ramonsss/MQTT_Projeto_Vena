[platformio]
extra_configs = platformio.local.ini

[common]
build_flags =
    -I include
    -D CONFIG_BT_NIMBLE_ROLE_BROADCASTER
    -D CONFIG_BT_NIMBLE_ROLE_PERIPHERAL

[env:esp32dev]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
upload_speed = 921600
build_flags = ${common.build_flags}

lib_deps =
    br3ttb/PID@^1.2.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
    h2zero/NimBLE-Arduino@^2.1.0

; --- Override de credenciais WiFi/MQTT ---
; Crie um arquivo `firmware/platformio.local.ini` (ja gitignored) com:
;
;   [env:esp32dev]
;   build_flags = ${common.build_flags} -DWIFI_SSID=\"sua_rede\" -DWIFI_PASS=\"sua_senha\" -DMQTT_HOST=\"192.168.0.10\"
;
; O `extra_configs` acima carrega o arquivo local automaticamente e o
; merge respeita ${common.build_flags}, preservando o `-I include`.

; --- Native host tests (pio test -e native) ---
[env:native]
platform = native
test_framework = unity
build_flags = -I include -I lib/BleManager -D NATIVE_TEST
; ArduinoJson is header-only — add source manually via build_src_filter
build_src_filter = -<*> +<../test/>
lib_deps =
    bblanchon/ArduinoJson@^7
