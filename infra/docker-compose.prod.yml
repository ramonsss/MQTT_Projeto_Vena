# =============================================================================
# Vena — produção (Azure B2s, x86_64 / amd64)
# =============================================================================
# Uso:
#   cd /opt/vena
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Serviços:
#   caddy      — reverse proxy HTTPS + Let's Encrypt (porta 80 / 443)
#   mosquitto  — broker MQTT  (porta 1883 TCP interno, 8883 TLS externo)
#   fastapi    — backend REST + MQTT worker embutido (interno :8000)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Caddy — HTTPS automático + proxy para FastAPI
  # Mosquitto TLS é gerido pelo próprio Mosquitto (reutiliza cert do Caddy).
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Compartilha certificados com Mosquitto (leitura de /data/caddy/certificates)
      - caddy_data:/caddy_certs:ro
    networks:
      - vena_net
    depends_on:
      fastapi:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Mosquitto — broker MQTT
  # Porta 1883 só aceita conexões internas (bind 127.0.0.1).
  # Porta 8883 aceita MQTT/TLS externo usando o certificado gerado pelo Caddy.
  # ---------------------------------------------------------------------------
  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"   # interno — FastAPI worker acessa via bridge
      - "8883:8883"              # externo — MQTT/TLS para dispositivos e app
    volumes:
      - ./mosquitto/mosquitto.prod.conf:/etc/mosquitto/mosquitto.conf:ro
      - ./mosquitto/passwd:/etc/mosquitto/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      # Certificados gerados pelo Caddy (Let's Encrypt)
      - caddy_data:/caddy_certs:ro
    networks:
      - vena_net
    depends_on:
      fastapi:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # FastAPI — backend REST + MQTT worker embutido no lifespan
  # Não expõe porta externamente — Caddy faz proxy via rede interna.
  # ---------------------------------------------------------------------------
  fastapi:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: vena-fastapi:prod
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      # Dentro do compose a porta 1883 do Mosquitto é acessível pelo service name
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    expose:
      - "8000"
    networks:
      - vena_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
  mosquitto_data:
  mosquitto_log:

networks:
  vena_net:
    driver: bridge
