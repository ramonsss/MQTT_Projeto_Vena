# =============================================================================
# Vena — produção (Azure B2s, x86_64 / amd64)
# =============================================================================
# Uso:
#   cd /opt/vena
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Serviços:
#   caddy      — reverse proxy HTTPS + Let's Encrypt (porta 80 / 443)
#   mosquitto  — broker MQTT  (porta 1883 TCP interno, 8883 TLS externo)
#   fastapi    — backend REST + MQTT worker embutido (interno :8000)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Caddy — HTTPS automático + proxy para FastAPI
  # Mosquitto TLS é gerido pelo próprio Mosquitto (reutiliza cert do Caddy).
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - vena_net
    depends_on:
      fastapi:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Mosquitto — broker MQTT
  # Porta 1883 só aceita conexões internas (bind 127.0.0.1).
  # Porta 8883 aceita MQTT/TLS externo usando o certificado gerado pelo Caddy.
  # ---------------------------------------------------------------------------
  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    restart: unless-stopped
    user: "0"  # root — necessário para ler certs do Caddy e copiá-los
    # Copia os certs do volume read-only do Caddy para um volume writable,
    # ajusta permissões e então inicia o Mosquitto.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        CERT_SRC=/caddy_certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/vena-demo.duckdns.org
        CERT_DST=/mosquitto/certs
        mkdir -p "$$CERT_DST"
        cp "$$CERT_SRC/vena-demo.duckdns.org.crt" "$$CERT_DST/server.crt"
        cp "$$CERT_SRC/vena-demo.duckdns.org.key" "$$CERT_DST/server.key"
        # World-readable: volume é interno ao container, sem risco real
        chmod 644 "$$CERT_DST/server.crt" "$$CERT_DST/server.key"
        exec mosquitto -c /etc/mosquitto/mosquitto.conf
    ports:
      - "127.0.0.1:1883:1883"   # interno — FastAPI worker acessa via bridge
      - "8883:8883"              # externo — MQTT/TLS para dispositivos e app
    volumes:
      - ./mosquitto/mosquitto.prod.conf:/etc/mosquitto/mosquitto.conf:ro
      - ./mosquitto/passwd:/etc/mosquitto/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - mosquitto_certs:/mosquitto/certs       # volume writable para os certs copiados
      - caddy_data:/caddy_certs:ro             # leitura dos certs originais do Caddy
    networks:
      - vena_net
    depends_on:
      fastapi:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # FastAPI — backend REST + MQTT worker embutido no lifespan
  # Não expõe porta externamente — Caddy faz proxy via rede interna.
  # ---------------------------------------------------------------------------
  fastapi:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: vena-fastapi:prod
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      # Dentro do compose a porta 1883 do Mosquitto é acessível pelo service name
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    expose:
      - "8000"
    networks:
      - vena_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
  mosquitto_data:
  mosquitto_log:
  mosquitto_certs:

networks:
  vena_net:
    driver: bridge
