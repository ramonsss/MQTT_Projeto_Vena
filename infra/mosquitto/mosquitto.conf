# ---------------------------------------------------------------------------
# Listeners
# ---------------------------------------------------------------------------
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ---------------------------------------------------------------------------
# Auth — mosquitto-go-auth plugin (HTTP backend mode)
#
# O plugin chama o backend FastAPI para autenticar clientes e verificar ACL.
# "host.docker.internal" resolve para o host onde o backend uvicorn roda.
#
# Para desabilitar auth em dev (ex: testar sem JWT), mude para:
#   allow_anonymous true
#   e comente o bloco "plugin" abaixo.
# ---------------------------------------------------------------------------
allow_anonymous false

plugin /mosquitto/go-auth.so

# Nega caracteres especiais no clientId para evitar injeção de tópico
auth_plugin_deny_special_chars true

# Backend HTTP
auth_opt_backends http
auth_opt_http_host     host.docker.internal
auth_opt_http_port     8000
auth_opt_http_getuser_uri   /mqtt/auth
auth_opt_http_aclcheck_uri  /mqtt/acl
auth_opt_http_superuser_uri /mqtt/superuser
auth_opt_http_method   POST
auth_opt_http_params_mode form
auth_opt_http_timeout  5

# Cache de auth/ACL — evita bater no backend a cada mensagem publicada
auth_opt_cache              true
auth_opt_cache_type         go-cache
auth_opt_cache_reset        true
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds  300

# ---------------------------------------------------------------------------
# Persistência e logs
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
