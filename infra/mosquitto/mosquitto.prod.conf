# =============================================================================
# Mosquitto — configuração de produção
# =============================================================================
# Certificado TLS: reutiliza o que o Caddy já obteve via Let's Encrypt.
# Caminho dentro do container (montado via volume caddy_data):
#   /caddy_certs/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/
#     vena-demo.duckdns.org/vena-demo.duckdns.org.crt
#     vena-demo.duckdns.org/vena-demo.duckdns.org.key
#
# Substitua "vena-demo.duckdns.org" pelo seu domínio real nos dois paths abaixo.
# =============================================================================

# ---------------------------------------------------------------------------
# Listener interno (sem TLS) — apenas acessível pela rede Docker interna
# FastAPI worker conecta aqui; nunca exposto externamente.
# 0.0.0.0 é necessário para que outros containers (fastapi) consigam conectar
# via hostname Docker (mosquitto:1883). O isolamento externo é feito pelo
# docker-compose que faz bind 127.0.0.1:1883:1883 no host.
# ---------------------------------------------------------------------------
listener 1883 0.0.0.0
protocol mqtt

# ---------------------------------------------------------------------------
# Listener externo MQTT/TLS — dispositivos ESP32 e app mobile conectam aqui
# ---------------------------------------------------------------------------
listener 8883 0.0.0.0
protocol mqtt

cafile  /etc/ssl/certs/ca-certificates.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

tls_version tlsv1.2

# ---------------------------------------------------------------------------
# Autenticação — mosquitto-go-auth plugin (HTTP backend)
# Aponta para o container fastapi via nome DNS interno do Docker.
# ---------------------------------------------------------------------------
allow_anonymous false

plugin /mosquitto/go-auth.so

# false: permite wildcards MQTT (+ e #) nas subscriptions do backend worker.
# O broker já valida wildcards internamente; bloquear aqui só quebra o ACL
# para clientes legítimos que assinam vena/+/telemetry.
auth_plugin_deny_special_chars false

auth_opt_backends http
auth_opt_http_host     fastapi
auth_opt_http_port     8000
auth_opt_http_getuser_uri   /mqtt/auth
auth_opt_http_aclcheck_uri  /mqtt/acl
auth_opt_http_superuser_uri /mqtt/superuser
auth_opt_http_method   POST
auth_opt_http_params_mode form
auth_opt_http_timeout  5

# Cache de auth/ACL — evita bater no backend a cada mensagem
auth_opt_cache              true
auth_opt_cache_type         go-cache
auth_opt_cache_reset        true
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds  300

# ---------------------------------------------------------------------------
# Persistência e logs
# ---------------------------------------------------------------------------
persistence false
# persistence_location not needed — all telemetry persisted in Supabase

# Logs via stdout — Docker Compose captura com 'docker compose logs'
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
