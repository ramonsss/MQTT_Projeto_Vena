services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venauser}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/etc/mosquitto/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    extra_hosts:
      # Permite que o container alcance o backend rodando no host
      # Funciona no Docker Desktop (Windows/Mac) e em Linux com Docker >= 20.10
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
